<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hello, world!</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />

  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="test.css">
  <script src="main.js"></script>
</head>
<body>
  <h1>Welcome back!</h1>

  

  <div id="wrap">
    <h2> Quests </h2><br>
    <div id="quests">
      
      <div class="quest-wrap">
        <div class="quest" id="card-game-quest"><input type="checkbox" id="card-game"><label for="card-game"> Play one round of a card game you've never played before</label></div>
      </div>
      <div class="quest-wrap">
        <div class="quest" id="touch-grass-quest"><input type="checkbox" id="touch-grass"><label for="touch-grass"> Go outside for 15 minutes and touch grass</label></div>
      </div>
      <div class="quest-wrap">
        <div class="quest" id="boredom-quest"><input type="checkbox" id="boredom"><label for="boredom"> Sit in silence for 10 minutes (in absolute boredom)</label></div>
      </div>
      <div class="quest-wrap">
        <div class="quest" id="hobby-quest"><input type="checkbox" id="hobby"><label for="hobby"> Learn a new hobby</label></div>
      </div>
      <div class="quest-wrap">
        <div class="quest" id="book-quest"><input type="checkbox" id="book"><label for="book"> Read 30 pages of a book you like</label></div>
      </div>
      <div class="quest-wrap">
        <div class="quest" id="clean-house-quest"><input type="checkbox" id="clean-house"><label for="clean-house"> Clean up your house</label></div>
      </div>
      <div class="quest-wrap">
        <div class="quest" id="music-quest"><input type="checkbox" id="music"><label for="music"> Listen to a new music genre</label></div>
      </div>
      <div class="quest-wrap">
        <div class="quest" id="origami-quest"><input type="checkbox" id="origami"><label for="origami"> Learn how to make an origami</label></div>
      </div>
    </div>
  </div>

  <div id="shop">
    <h2>Shop (10 points each):</h2>

    <div id="game1"><a href="game1.html">HangMan!</a></div>


    <div id="game2"><a href="game2.html">Dodge!</a></div>


    <div id="game3"><a href="game3.html">Catch!</a></div>

    <div id="points"><p>Points: 0</p></div>

  </div>

  <button id="reset">Reset Progress</button>

</body>
</html>
